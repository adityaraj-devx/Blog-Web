{% extends "layout.html" %} {% block title %}{% endblock %} {% block content %}
<h1>POSTS</h1>
<div id="posts">
  {% for post in posts %}
  <div class="card">
    <div class="card-header">
        <a href="/posts/{{post.user.username}}">{{post.user.username}}</a>
    </div>
    <div class="card-body">
        <div class="card-text">{{post.text}}</div>
    </div>
    <div class="card-footer text-muted">
        {{post.date}}
    </div>
  </div>
  {% endfor %}
</div>
{% endblock %}
